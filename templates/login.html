<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>เข้าสู่ระบบ — ระบบแข่งขันวิชาการ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { font-family: 'Sarabun', sans-serif; background: linear-gradient(135deg, #1a5276, #2e86c1); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card { width: 100%; max-width: 420px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
  .login-header { background: linear-gradient(135deg, #1a5276, #2e86c1); color: #fff; border-radius: 16px 16px 0 0; padding: 32px 32px 24px; text-align: center; }
  .login-header .trophy { font-size: 3rem; }
  .login-header h1 { font-size: 1.5rem; font-weight: 700; margin: 8px 0 4px; }
  .login-header p { opacity: .8; font-size: .9rem; margin: 0; }
  .login-body { padding: 32px; }
  .form-control { border-radius: 8px; padding: 10px 14px; }
  .btn-login { border-radius: 8px; padding: 11px; font-size: 1rem; font-weight: 600; }
</style>
</head>
<body>
<div class="login-card card border-0">
  <div class="login-header">
    <div class="trophy">🏆</div>
    <h1>ระบบแข่งขันวิชาการ</h1>
    <p>กรุณาเข้าสู่ระบบเพื่อดำเนินการ</p>
  </div>
  <div class="login-body">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alert alert-{{ cat }} py-2 mb-3">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">ชื่อผู้ใช้</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input name="username" class="form-control" placeholder="username" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">รหัสผ่าน</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input name="password" type="password" class="form-control" placeholder="password" required>
        </div>
      </div>
      <button class="btn btn-primary w-100 btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>เข้าสู่ระบบ
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
